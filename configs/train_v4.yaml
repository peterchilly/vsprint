# ERes2NetV2 训练配置 v4
# 方案 C: VoxCeleb1 + VoxCeleb2 + 音频增强
#
# 改进:
# - 合并 VoxCeleb1 (1210说话人) + VoxCeleb2 (5994说话人) = 7204说话人
# - 数据增强: SpecAugment + RandomGain + SpeedPerturb
# - margin=0.2, scale=32 (回到 v3 参数, v3.1 的 margin=0.3 导致过拟合)
# - dropout=0.2 (介于 v3 的 0.3 和 v3.1 的 0.1 之间)
# - lr=0.001, AdamW, weight_decay=0.01
# - batch_size=128 (更大 batch 更稳定)
# - epochs=100, patience=25
# - fixed_length=200 (2秒足够)
# - num_workers=8

training:
  epochs: 100
  batch_size: 128
  lr: 0.001
  optimizer: AdamW
  momentum: 0.9
  weight_decay: 0.01
  lr_schedule: cosine
  warmup_epochs: 5
  grad_clip: 1.0
  amp: true
  gradient_accumulation: 1
  early_stopping_patience: 25
  label_smoothing: 0.1

model:
  variant: "34"
  n_mels: 80
  embedding_dim: 192
  scale: 4
  se_reduction: 8
  pool_attention_dim: 128
  dropout: 0.2

loss:
  type: aam_softmax
  margin: 0.2
  scale: 32.0
  label_smoothing: 0.1

data:
  # 多数据源: VoxCeleb1 + VoxCeleb2
  features_dirs:
    - data/voxceleb/features
    - F:/voxceleb2/dev/features
  fixed_length: 200
  num_workers: 8
  pin_memory: true
  val_split_ratio: 0.1
  val_random_seed: 42
  augment: true
  augment_config:
    spec_augment:
      time_mask: 15
      freq_mask: 25
      num_masks: 2
    random_gain:
      gain_range: 5.0
    speed_perturb:
      speed_factors: [0.9, 1.0, 1.1]
      prob: 0.5

checkpoint:
  save_dir: checkpoints_v4
  save_best: true
  save_interval: 5
  resume: null

logging:
  tensorboard_dir: runs_v4
  log_interval: 50
  gpu_monitor_interval: 30
