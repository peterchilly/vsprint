# ERes2NetV2 说话人识别训练配置
# 基于 RTX 5070 Ti (16GB VRAM)

training:
  epochs: 80
  batch_size: 128
  lr: 0.1
  optimizer: SGD
  momentum: 0.9
  weight_decay: 0.0001
  lr_schedule: cosine
  warmup_epochs: 5
  grad_clip: 1.0
  amp: true
  gradient_accumulation: 1
  early_stopping_patience: 15

model:
  variant: "34"           # 34/50/101/152
  n_mels: 80
  embedding_dim: 192
  scale: 4                # 分组数
  se_reduction: 8
  pool_attention_dim: 128
  dropout: 0.3

loss:
  type: aam_softmax       # aam_softmax / arcface / softmax
  margin: 0.2
  scale: 30.0

data:
  features_dir: data/voxceleb/features
  fixed_length: 200       # ~2 秒 (200 frames @ 10ms)
  num_workers: 4
  pin_memory: true
  val_split_ratio: 0.1    # 从 Dev 集中划分 10% 说话人作为验证集
  val_random_seed: 42

checkpoint:
  save_dir: checkpoints
  save_best: true
  save_interval: 5
  resume: null            # checkpoint 路径（null 表示从头训练）

logging:
  tensorboard_dir: runs
  log_interval: 50
  gpu_monitor_interval: 30
