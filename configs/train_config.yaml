# ERes2NetV2 训练超参数配置
# 基于 RTX 5070 Ti (16GB VRAM)

training:
  epochs: 100
  batch_size: 64
  lr: 0.025
  optimizer: SGD
  momentum: 0.9
  weight_decay: 0.0001
  lr_schedule: cosine
  warmup_epochs: 5
  label_smoothing: 0.1
  grad_clip: 1.0
  amp: true
  gradient_accumulation: 1

data:
  image_size: 224
  num_workers: 4
  pin_memory: true
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]
  train_aug:
    random_crop: true
    random_flip: true
    color_jitter: true
  val_aug:
    center_crop: true

model:
  name: eres2netv2_50
  pretrained: false
  num_classes: 1000

checkpoint:
  save_dir: checkpoints
  save_best: true
  save_interval: 10
  early_stopping_patience: 20

logging:
  tensorboard_dir: runs
  log_interval: 50
  gpu_monitor_interval: 30
